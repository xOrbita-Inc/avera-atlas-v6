server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Proxy to Anthropic API — avoids browser CORS restrictions
    location /api/claude/ {
        proxy_pass         https://api.anthropic.com/;
        proxy_ssl_server_name on;
        proxy_set_header   Host              api.anthropic.com;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    # Proxy to ElevenLabs API — avoids browser CORS restrictions
    location /api/elevenlabs/ {
        proxy_pass         https://api.elevenlabs.io/;
        proxy_ssl_server_name on;
        proxy_set_header   Host              api.elevenlabs.io;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }
}
