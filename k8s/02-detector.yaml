# AVERA-ATLAS SWIR Detector Service
# YOLOv8 spacecraft detection from optical/SWIR imagery.
# Model (spark_detector.onnx) is baked into the container.
# To update model: build new image version, update tag.
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: detector
  namespace: avera-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: detector
  template:
    metadata:
      labels:
        app: detector
    spec:
      containers:
      - name: detector
        image: avera/detector:v6
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: detector-service
  namespace: avera-system
spec:
  selector:
    app: detector
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
