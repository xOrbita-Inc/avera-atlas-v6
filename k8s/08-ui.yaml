# AVERA-ATLAS UI Service (ATLAS Dashboard)
# FastAPI backend serving the ATLAS operator interface.
# NodePort 30080 provides external access.
# All analytics delegated to APS services —
# ATLAS is presentation layer only.
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: avera-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
      - name: ui
        image: avera/ui:v6
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: SWIR_SERVICE_URL
          value: "http://detector-service:80/predict"
        - name: PHYSICS_CLASSIFIER_URL
          value: "http://physics-classifier-service:80/predict"
        - name: TRACKER_SERVICE_URL
          value: "http://tracker-service:80"
        - name: PLANNER_SERVICE_URL
          value: "http://planner-service:8060"
        - name: INGEST_SERVICE_URL
          value: "http://ingest-service:80"
        - name: DATA_DIR
          value: "/data/planner_artifacts"
        volumeMounts:
        - name: planner-data
          mountPath: /data/planner_artifacts
      volumes:
      - name: planner-data
        hostPath:
          path: /opt/avera/data
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: avera-system
spec:
  selector:
    app: ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30080
  type: NodePort
