# AVERA-ATLAS Visualization Service
# Generates MP4 trajectory videos and PNG summary
# charts from propagator output artifacts.
# File-watching service — no HTTP endpoints.
# No Service definition needed.
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: viz
  namespace: avera-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: viz
  template:
    metadata:
      labels:
        app: viz
    spec:
      containers:
      - name: viz
        image: avera/viz:v6
        imagePullPolicy: Never
        env:
        - name: DATA_DIR
          value: "/data/planner_artifacts"
        volumeMounts:
        - name: planner-data
          mountPath: /data/planner_artifacts
      volumes:
      - name: planner-data
        hostPath:
          path: /opt/avera/data
          type: DirectoryOrCreate
