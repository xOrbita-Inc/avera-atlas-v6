# AVERA-ATLAS Physics-Based Classifier Service
# DINOv2 ViT-Small classification of EM/RF and thermal
# spectrograms for orbital object identification.
#
# Model (orbital_classifier.onnx) is baked into the
# container at build time. To update the model, build
# a new image version and update the tag below.
# K3s rolling update handles zero-downtime deployment.
# This mirrors the CubeSat in-flight update pattern
# validated at the U-2 Federal Laboratory.
#
# ADR-009 Phase 1 — Macro F1: 0.8811, ECE: 0.0213
# Classes: ACTIVE_SAT, DEAD_SAT, DEBRIS_SMALL,
#          DEBRIS_LARGE, MANEUVERING
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: physics-classifier
  namespace: avera-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: physics-classifier
  template:
    metadata:
      labels:
        app: physics-classifier
    spec:
      containers:
      - name: physics-classifier
        image: avera/physics-classifier:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: TRACKER_HOST
          value: "tracker-service"
        - name: TRACKER_PORT
          value: "80"
---
apiVersion: v1
kind: Service
metadata:
  name: physics-classifier-service
  namespace: avera-system
spec:
  selector:
    app: physics-classifier
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
