# AVERA-ATLAS Tracker Service
# Multi-sensor fusion and track management.
# Receives detections from detector and
# physics-classifier services.
# Sits between detectors and propagator in pipeline:
#   detector → [TRACKER] → propagator
#   physics-classifier → [TRACKER] → propagator
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracker
  namespace: avera-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracker
  template:
    metadata:
      labels:
        app: tracker
    spec:
      containers:
      - name: tracker
        image: avera/tracker:v6
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: DATA_DIR
          value: "/data/planner_artifacts"
        volumeMounts:
        - name: planner-data
          mountPath: /data/planner_artifacts
      volumes:
      - name: planner-data
        hostPath:
          path: /opt/avera/data
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: tracker-service
  namespace: avera-system
spec:
  selector:
    app: tracker
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
