openapi: 3.0.3
info:
  title: APS Planner – Avoidance Decision Model
  description: |
    Microservice wrapper for the APS v2.5 decision model.

    **Position in the xOrbita stack**
    - Upstream: Propagator service supplies relative state & covariance at TCA;
      Ingest service supplies CDM covariance via GET /cdm/{primary}/{secondary}.
    - Downstream: ATLAS presentation layer consumes the machine-readable output;
      Spacecraft GNC receives burn commands.

    **Conventions (per Technical Plan)**
    - Frame: ECI (TEME internally as needed)
    - Positions: km
    - Velocities: km/s
    - Delta-v magnitudes: m/s
    - Times: UTC, ISO-8601
    - Covariance (p_rel_km2): km² (3x3 symmetric, row-major flat 9-element array)

    **Covariance source (added in 2.4.2)**
    The planner receives covariance_combined_rtn from the ingest service in RTN
    frame (km²). The planner adapter rotates RTN to ECI using the satellite r/v
    at TCA before flattening to p_rel_km2 for decision_model.py. The provenance
    of the covariance is tracked via covariance_source and echoed in the response.

    **Unit note on p_rel_km2**
    Raw CCSDS 508.0-B-1 covariance elements are stored in m². The ingest service
    converts to km² (divides by 1e6) before returning. The planner receives and
    passes km² throughout. Do not apply further unit conversion.

    **Changes in 2.5.0 (relative to 2.4.3)**
    - /v1/evaluate now calls evaluate_conjunction_v25() (maneuver_scorer.py)
      which returns a ManeuverScoringResult — a strict superset of the v2.4
      response. All v2.4 output fields preserved with identical names.
    - EvaluateResponse: added optional atlas_artifact field (ATLASManeuverArtifact).
      Present on all successful /v1/evaluate calls. Never present on batch calls.
    - Added ATLASManeuverArtifact, RiskSummary, ManeuverRecommendation2_5,
      DecisionRationale, PostManeuverProjection, NoGoReasoning,
      VerificationResult, MissionImpactSummary, SecondaryConflictCheck schema
      components.
    - info.version bumped from 2.4.3 to 2.5.0.
    - No fields renamed or removed (SCRUM-281 constraint satisfied).
  contact:
    name: xOrbita APS Team
  version: 2.5.0
servers:
- url: http://localhost:8060
  description: Local / Jetson dev
- url: http://planner:8060
  description: Docker Compose service name
paths:
  /health:
    get:
      summary: Liveness probe
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/evaluate:
    post:
      summary: Evaluate a single conjunction and return the recommended avoidance maneuver
      description: |
        Accepts the relative state, covariance, satellite inertial state,
        and operator policy for one conjunction event. Returns the best
        burn candidate with decision metrics and the full ATLASManeuverArtifact.

        This is the REST equivalent of evaluate_conjunction_v25() in
        common/maneuver_scorer.py (APS 2.5). The v2.4 request shape is
        accepted unchanged.

        The caller (planner adapter) is responsible for:
        1. Fetching covariance_combined_rtn from the ingest service
           GET /cdm/{primary_norad}/{secondary_norad}
        2. Applying the RTN-to-ECI rotation using r_sat_km / v_sat_km_s at TCA
        3. Flattening the resulting 3x3 ECI matrix to the 9-element p_rel_km2
        4. Setting covariance_source from the ingest response
      operationId: evaluateConjunction
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequest"
        required: true
      responses:
        "200":
          description: Recommended maneuver, decision metrics, and ATLAS artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"
        "422":
          description: Validation error (missing/malformed fields)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/evaluate/batch:
    post:
      summary: Evaluate multiple conjunctions in a single call
      description: |
        Accepts an array of conjunction events. Returns a ranked list of
        recommended maneuvers, one per conjunction, sorted by utility score
        descending. Uses the v2.4 evaluate_batch() path — atlas_artifact is
        not included in batch responses (9.6 scope).
      operationId: evaluateBatch
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateBatchRequest"
        required: true
      responses:
        "200":
          description: Array of maneuver recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateBatchResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    EvaluateRequest:
      required:
      - conjunction
      - conjunction_id
      - policy
      - satellite
      type: object
      properties:
        conjunction_id:
          type: string
          description: Unique identifier for this conjunction event
          example: conj-2026-0302-001
        satellite:
          $ref: "#/components/schemas/SatelliteState"
        conjunction:
          $ref: "#/components/schemas/ConjunctionState"
        policy:
          $ref: "#/components/schemas/OperatorPolicy"
    SatelliteState:
      required:
      - r_sat_km
      - sat_id
      - t_burn_utc
      - v_remaining_m_s
      - v_sat_km_s
      type: object
      properties:
        sat_id:
          type: string
          description: Satellite identifier
          example: XORB-001
        r_sat_km:
          maxItems: 3
          minItems: 3
          type: array
          description: "Satellite ECI position at burn time [x, y, z] (km)"
          example: [6878, 0, 0]
          items:
            type: number
        v_sat_km_s:
          maxItems: 3
          minItems: 3
          type: array
          description: "Satellite ECI velocity at burn time [vx, vy, vz] (km/s)"
          example: [0, 7.668, 0]
          items:
            type: number
        t_burn_utc:
          type: string
          description: "Planned burn execution time (UTC, ISO-8601)"
          format: date-time
          example: 2026-03-02T14:00:00Z
        v_remaining_m_s:
          type: number
          description: Remaining maneuver authority (m/s)
          example: 25
      description: Satellite inertial state at planned burn time
    ConjunctionState:
      required:
      - obj_id
      - p_rel_km2
      - r_rel_km
      - t_ca_utc
      type: object
      properties:
        obj_id:
          type: string
          description: Object / debris identifier
          example: obj-30337
        primary_norad:
          type: string
          description: |
            NORAD catalog ID of the primary (protected) object.
            Required for the planner to fetch real CDM covariance from the
            ingest service. If omitted, the planner falls back to a surrogate
            identity matrix and sets covariance_source to "surrogate_identity".
          example: "25544"
        t_ca_utc:
          type: string
          description: "Time of Closest Approach (UTC, ISO-8601)"
          format: date-time
          example: 2026-03-02T15:30:00Z
        r_rel_km:
          maxItems: 3
          minItems: 3
          type: array
          description: "Relative position at TCA [x, y, z] (km). dr = r_obj - r_sat"
          example: [0.5, -0.3, 0.1]
          items:
            type: number
        p_rel_km2:
          maxItems: 9
          minItems: 9
          type: array
          description: |
            Relative covariance at TCA in km², ECI frame.
            3x3 symmetric matrix in row-major flat form.
            Unit note: raw CCSDS 508.0-B-1 values are in m². The ingest
            service converts to km² before returning. Do not apply further
            unit conversion here.
          example: [0.01, 0, 0, 0, 0.01, 0, 0, 0, 0.01]
          items:
            type: number
        pc_precomputed:
          type: number
          description: |
            Optional pre-computed collision probability from ingest
            (Space-Track published Pc, if available).
            If null the planner uses Mahalanobis distance as risk surrogate.
          nullable: true
        miss_distance_km:
          type: number
          description: |
            Optional miss distance at TCA [km]. Used by build_atlas_artifact()
            for RiskSummary and feasibility checks. If omitted, miss distance
            checks are skipped.
          nullable: true
        covariance_source:
          $ref: "#/components/schemas/CovarianceSourceEnum"
      description: Relative geometry at Time of Closest Approach (TCA)
    OperatorPolicy:
      required:
      - dv_mag_limit_m_s
      - lambda_L
      - lambda_v
      type: object
      properties:
        lambda_v:
          type: number
          description: "Fuel-cost weight: U = delta_C - lambda_v * dv - lambda_L * dL"
          example: 0.01
        lambda_L:
          type: number
          description: Lifetime-penalty weight in the utility function
          example: 0.005
        dv_mag_limit_m_s:
          type: number
          description: Maximum allowable burn magnitude for this event (m/s)
          example: 1
        burn_window:
          $ref: "#/components/schemas/BurnWindow"
        hard_constraints:
          $ref: "#/components/schemas/HardConstraints"
      description: Operator policy inputs that tune the decision objective
    BurnWindow:
      type: object
      properties:
        earliest_utc:
          type: string
          description: Earliest permissible burn time (UTC)
          format: date-time
        latest_utc:
          type: string
          description: Latest permissible burn time (UTC)
          format: date-time
      description: Temporal constraints on burn execution
    HardConstraints:
      type: object
      properties:
        no_burn_windows:
          type: array
          description: "Time intervals where burns are forbidden (e.g., eclipse, comms)"
          items:
            $ref: "#/components/schemas/NoBurnWindow"
        attitude_restricted:
          type: boolean
          description: "If true, only along-track burns are permitted"
          default: false
        power_constrained:
          type: boolean
          description: "If true, apply reduced thrust profile"
          default: false
      description: Additional execution constraints
    NoBurnWindow:
      type: object
      properties:
        start_utc:
          type: string
          format: date-time
        end_utc:
          type: string
          format: date-time
    EvaluateResponse:
      required:
      - conjunction_id
      - metrics
      - recommendation
      type: object
      properties:
        conjunction_id:
          type: string
          example: conj-2026-0302-001
        recommendation:
          $ref: "#/components/schemas/ManeuverRecommendation"
        metrics:
          $ref: "#/components/schemas/DecisionMetrics"
        covariance_source:
          $ref: "#/components/schemas/CovarianceSourceEnum"
        evaluated_at:
          type: string
          description: Timestamp when the evaluation was computed
          format: date-time
        detection_confidence:
          type: object
          nullable: true
          description: ADR-007 detection range-confidence metadata passed through from the upstream detector/tracker pipeline when provided.
          properties:
            estimated_range_km:
              type: number
              format: float
              description: Estimated sensor-to-object range in kilometers.
              example: 45.2
            debris_size_class:
              type: string
              description: Debris size class used for ADR-007 R_max lookup.
              enum:
              - 1cm
              - 5cm
              - 10cm
              example: 5cm
            range_confidence:
              type: string
              description: ADR-007 physics-based confidence tier based on estimated range divided by R_max.
              enum:
              - HIGH
              - MEDIUM
              - LOW
              example: HIGH
        atlas_artifact:
          description: |
            Full ATLASManeuverArtifact bundle (APS 2.5 / 9.6). Present on all
            successful /v1/evaluate calls. Contains all five required operator
            artifacts (RiskSummary, ManeuverRecommendation, DecisionRationale,
            PostManeuverProjection, NoGoReasoning) plus VerificationResult and
            MissionImpactSummary. Absent on /v1/evaluate/batch responses.
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ATLASManeuverArtifact"
    ManeuverRecommendation:
      required:
      - direction
      - dv_eci_km_s
      - dv_magnitude_m_s
      - t_burn_utc
      - utility
      type: object
      properties:
        direction:
          type: string
          description: Named burn direction (best of the evaluated candidates)
          example: prograde
          enum:
          - prograde
          - retrograde
          - radial
          - anti-radial
          - cross-track
          - anti-cross
          - no-burn
        dv_eci_km_s:
          maxItems: 3
          minItems: 3
          type: array
          description: "Recommended delta-v vector in ECI [dvx, dvy, dvz] (km/s)"
          example: [0, 0.001, 0]
          items:
            type: number
        dv_magnitude_m_s:
          type: number
          description: Burn magnitude (m/s)
          example: 1
        t_burn_utc:
          type: string
          description: Scheduled burn time (echoed from request)
          format: date-time
        utility:
          type: number
          description: "Utility score: U = delta_C - lambda_v * dv - lambda_L * dL"
          example: 4.23
      description: The recommended burn -- machine-readable output for GNC / ATLAS
    DecisionMetrics:
      required:
      - delta_C
      - fuel_cost_m_s
      - lifetime_penalty
      - m2_post
      - m2_pre
      type: object
      properties:
        delta_C:
          type: number
          description: "Confidence gain: delta_C = m2_pre - m2_post (Mahalanobis, v2.4 convention)"
          example: 5.12
        m2_pre:
          type: number
          description: Pre-maneuver Mahalanobis squared distance
          example: 8.34
        m2_post:
          type: number
          description: Post-maneuver Mahalanobis squared distance
          example: 3.22
        fuel_cost_m_s:
          type: number
          description: Fuel expenditure (m/s)
          example: 1
        lifetime_penalty:
          type: number
          description: Dimensionless lifetime cost = dv / V_remaining
          example: 0.04
        risk_surrogate_post:
          type: number
          description: Post-maneuver risk surrogate (1/m2_post or Pc if available)
          example: 0.31
        all_candidates:
          type: array
          description: Full sweep results for all evaluated directions (for audit / ATLAS)
          items:
            $ref: "#/components/schemas/CandidateResult"
      description: Decision-support metrics (consumed by ATLAS for display)
    CandidateResult:
      type: object
      properties:
        direction:
          type: string
        dv_eci_km_s:
          type: array
          items:
            type: number
        delta_C:
          type: number
        utility:
          type: number
    CovarianceSourceEnum:
      type: string
      description: |
        Provenance of the covariance used in this evaluation.
        - real_cdm: covariance assembled from a live Space-Track CDM record
          via the ingest service GET /cdm endpoint.
        - surrogate_identity: identity matrix substitute, used when no CDM
          is available for the object pair. Results are pipeline-valid but
          not operationally accurate. ATLAS must display a visible warning
          to the operator when this value is present in the response.
      example: real_cdm
      enum:
      - real_cdm
      - surrogate_identity
    ATLASManeuverArtifact:
      type: object
      description: |
        Complete artifact bundle for ATLAS display, operator review, and audit.
        Assembles all five required sub-artifacts (APS_2_5_Research_V3.ipynb §5.3)
        plus VerificationResult and MissionImpactSummary. All v2.4 fields are
        preserved for backward compatibility.
      properties:
        conjunction_id:
          type: string
        sat_id:
          type: string
        evaluated_at:
          type: string
          format: date-time
        direction:
          type: string
          description: v2.4 preserved field
        utility:
          type: number
          description: v2.4 preserved field
        delta_C:
          type: number
          description: v2.4 preserved field
        m2_pre:
          type: number
        m2_post:
          type: number
        risk_summary:
          $ref: "#/components/schemas/RiskSummary"
        recommendation:
          description: "A2: What should be done? Null if no-go."
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ManeuverRecommendation2_5"
        rationale:
          $ref: "#/components/schemas/DecisionRationale"
        post_maneuver:
          description: "A4: What happens if we execute? Null if no-go."
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PostManeuverProjection"
        no_go:
          description: "A5: Why are we not acting? Null if maneuver recommended."
          nullable: true
          allOf:
            - $ref: "#/components/schemas/NoGoReasoning"
        verification:
          $ref: "#/components/schemas/VerificationResult"
        mission_impact:
          $ref: "#/components/schemas/MissionImpactSummary"
    RiskSummary:
      type: object
      description: "A1: Why is action needed?"
      properties:
        pc_pre:
          type: number
          nullable: true
          description: Collision probability before maneuver. Null if not supplied.
        miss_distance_km:
          type: number
          nullable: true
        mahalanobis_pre:
          type: number
          description: sqrt(m2_pre)
        tca_utc:
          type: string
          format: date-time
        covariance_quality:
          type: string
          enum: [good, degraded, dilution_region]
        maneuver_required:
          type: boolean
        monitor_only:
          type: boolean
    ManeuverRecommendation2_5:
      type: object
      description: "A2: What should be done? (v2.5 extended fields)"
      properties:
        direction:
          type: string
        dv_eci_km_s:
          type: array
          items:
            type: number
        dv_magnitude_m_s:
          type: number
        dv_return_m_s:
          type: number
          description: Return burn cost [m/s]. 0.0 for non-constellated satellites.
        dv_total_m_s:
          type: number
          description: Total mission delta-v cost including return [m/s].
        burn_time_utc:
          type: string
          format: date-time
        drag_correction_applied:
          type: boolean
    DecisionRationale:
      type: object
      description: "A3: Why this maneuver?"
      properties:
        utility_score:
          type: number
        delta_C:
          type: number
        dv_cost_term:
          type: number
        lifetime_cost_term:
          type: number
        slot_cost_term:
          type: number
        lifetime_fraction_used:
          type: number
        policy_constraints_applied:
          type: array
          items:
            type: string
        candidate_rank:
          type: integer
        n_candidates_evaluated:
          type: integer
        all_candidates:
          type: array
          items:
            $ref: "#/components/schemas/CandidateResult"
        scoring_weights:
          type: object
          additionalProperties:
            type: number
    PostManeuverProjection:
      type: object
      description: "A4: What happens if we execute?"
      properties:
        m2_post:
          type: number
        mahalanobis_post:
          type: number
        risk_surrogate_post:
          type: number
        slot_recovery_orbits:
          type: number
        slot_recovery_time_s:
          type: number
        slot_recovery_feasible:
          type: boolean
        secondary_conflict:
          $ref: "#/components/schemas/SecondaryConflictCheck"
    NoGoReasoning:
      type: object
      description: "A5: Why are we not acting?"
      properties:
        reason_code:
          type: string
          enum:
          - pc_below_threshold
          - propulsion_infeasible
          - no_utility_gain
          - trivial_event
          - blackout_window
        human_readable:
          type: string
        pc_at_decision:
          type: number
          nullable: true
        mahalanobis_at_decision:
          type: number
    VerificationResult:
      type: object
      description: Post-burn pass/fail assessment (planning-time estimate, not real-time)
      properties:
        passed:
          type: boolean
        risk_reduced:
          type: boolean
        utility_positive:
          type: boolean
        secondary_clear:
          type: boolean
        budget_within_limits:
          type: boolean
        recovery_within_limits:
          type: boolean
        failure_reasons:
          type: array
          items:
            type: string
        m2_pre:
          type: number
        m2_post:
          type: number
        delta_m2:
          type: number
        verification_note:
          type: string
    MissionImpactSummary:
      type: object
      properties:
        dv_consumed_m_s:
          type: number
        v_remaining_after_m_s:
          type: number
        lifetime_fraction_before:
          type: number
        lifetime_fraction_after:
          type: number
        slot_drift_km:
          type: number
        slot_tolerance_km:
          type: number
        slot_recovery_required:
          type: boolean
        slot_recovery_orbits:
          type: number
        constellation_impact_note:
          type: string
    SecondaryConflictCheck:
      type: object
      properties:
        secondary_check_performed:
          type: boolean
        secondary_conjunction_clear:
          type: boolean
        flagged_objects:
          type: array
          items:
            type: string
        operator_note:
          type: string
    EvaluateBatchRequest:
      required:
      - conjunctions
      type: object
      properties:
        conjunctions:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/EvaluateRequest"
    EvaluateBatchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/EvaluateResponse"
        evaluated_at:
          type: string
          format: date-time
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 2.5.0
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
          example: r_rel_km must be a 3-element array
        detail:
          type: object
          description: Machine-readable validation detail
