openapi: 3.0.3
info:
  title: APS Planner – Avoidance Decision Model
  description: |
    Microservice wrapper for the APS v2.4 decision model (decision_model.py).

    **Position in the xOrbita stack**
    - Upstream: Propagator service supplies relative state & covariance at TCA;
      Ingest service supplies CDM covariance via GET /cdm/{primary}/{secondary}.
    - Downstream: ATLAS presentation layer consumes the machine-readable output;
      Spacecraft GNC receives burn commands.

    **Conventions (per Technical Plan)**
    - Frame: ECI (TEME internally as needed)
    - Positions: km
    - Velocities: km/s
    - Delta-v magnitudes: m/s
    - Times: UTC, ISO-8601
    - Covariance (p_rel_km2): km² (3x3 symmetric, row-major flat 9-element array)

    **Covariance source (added in 2.4.2)**
    The planner receives covariance_combined_rtn from the ingest service in RTN
    frame (km²). The planner adapter rotates RTN to ECI using the satellite r/v
    at TCA before flattening to p_rel_km2 for decision_model.py. The provenance
    of the covariance is tracked via covariance_source and echoed in the response.

    **Unit note on p_rel_km2**
    Raw CCSDS 508.0-B-1 covariance elements are stored in m². The ingest service
    converts to km² (divides by 1e6) before returning. The planner receives and
    passes km² throughout. Do not apply further unit conversion.

    **Changes in 2.4.2 (relative to 2.4.1)**
    - ConjunctionState: added optional covariance_source field
    - EvaluateResponse: added covariance_source field (echoed from request)
    - Added CovarianceSourceEnum schema component
    - Added unit conversion note to p_rel_km2 description
    - Renamed inline_response schemas to explicit named schemas
    - Updated info.description to document ingest service dependency
  contact:
    name: xOrbita APS Team
  version: 2.4.3
servers:
- url: http://localhost:8060
  description: Local / Jetson dev
- url: http://planner:8060
  description: Docker Compose service name
paths:
  /health:
    get:
      summary: Liveness probe
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/evaluate:
    post:
      summary: Evaluate a single conjunction and return the recommended avoidance maneuver
      description: |
        Accepts the relative state, covariance, satellite inertial state,
        and operator policy for one conjunction event. Returns the best
        burn candidate with decision metrics.

        This is the REST equivalent of evaluate_candidates() in
        avoid/decision_model.py.

        The caller (planner adapter) is responsible for:
        1. Fetching covariance_combined_rtn from the ingest service
           GET /cdm/{primary_norad}/{secondary_norad}
        2. Applying the RTN-to-ECI rotation using r_sat_km / v_sat_km_s at TCA
        3. Flattening the resulting 3x3 ECI matrix to the 9-element p_rel_km2
        4. Setting covariance_source from the ingest response
      operationId: evaluateConjunction
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequest"
        required: true
      responses:
        "200":
          description: Recommended maneuver and decision metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"
        "422":
          description: Validation error (missing/malformed fields)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/evaluate/batch:
    post:
      summary: Evaluate multiple conjunctions in a single call
      description: |
        Accepts an array of conjunction events. Returns a ranked list of
        recommended maneuvers, one per conjunction, sorted by utility score
        descending.
      operationId: evaluateBatch
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateBatchRequest"
        required: true
      responses:
        "200":
          description: Array of maneuver recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateBatchResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    EvaluateRequest:
      required:
      - conjunction
      - conjunction_id
      - policy
      - satellite
      type: object
      properties:
        conjunction_id:
          type: string
          description: Unique identifier for this conjunction event
          example: conj-2026-0302-001
        satellite:
          $ref: "#/components/schemas/SatelliteState"
        conjunction:
          $ref: "#/components/schemas/ConjunctionState"
        policy:
          $ref: "#/components/schemas/OperatorPolicy"
    SatelliteState:
      required:
      - r_sat_km
      - sat_id
      - t_burn_utc
      - v_remaining_m_s
      - v_sat_km_s
      type: object
      properties:
        sat_id:
          type: string
          description: Satellite identifier
          example: XORB-001
        r_sat_km:
          maxItems: 3
          minItems: 3
          type: array
          description: "Satellite ECI position at burn time [x, y, z] (km)"
          example:
          - 6878
          - 0
          - 0
          items:
            type: number
        v_sat_km_s:
          maxItems: 3
          minItems: 3
          type: array
          description: "Satellite ECI velocity at burn time [vx, vy, vz] (km/s)"
          example:
          - 0
          - 7.668
          - 0
          items:
            type: number
        t_burn_utc:
          type: string
          description: "Planned burn execution time (UTC, ISO-8601)"
          format: date-time
          example: 2026-03-02T14:00:00Z
        v_remaining_m_s:
          type: number
          description: Remaining maneuver authority (m/s)
          example: 25
      description: Satellite inertial state at planned burn time
    ConjunctionState:
      required:
      - obj_id
      - p_rel_km2
      - r_rel_km
      - t_ca_utc
      type: object
      properties:
        obj_id:
          type: string
          description: Object / debris identifier
          example: obj-30337
        primary_norad:
          type: string
          description: |
            NORAD catalog ID of the primary (protected) object.
            Required for the planner to fetch real CDM covariance from the
            ingest service. If omitted, the planner falls back to a surrogate
            identity matrix and sets covariance_source to "surrogate_identity".
          example: "25544"
        t_ca_utc:
          type: string
          description: "Time of Closest Approach (UTC, ISO-8601)"
          format: date-time
          example: 2026-03-02T15:30:00Z
        r_rel_km:
          maxItems: 3
          minItems: 3
          type: array
          description: "Relative position at TCA [x, y, z] (km). dr = r_obj - r_sat"
          example:
          - 0.5
          - -0.3
          - 0.1
          items:
            type: number
        p_rel_km2:
          maxItems: 9
          minItems: 9
          type: array
          description: |
            Relative covariance at TCA in km², ECI frame.
            3x3 symmetric matrix in row-major flat form:
            [c11, c12, c13, c21, c22, c23, c31, c32, c33]
            P_rel = P_obj + P_sat (assuming independence).

            Unit note: raw CCSDS 508.0-B-1 values are in m². The ingest
            service converts to km² (divides by 1e6) before returning
            covariance_combined_rtn. The planner adapter rotates RTN to ECI
            and flattens to this 9-element field. Do not apply further
            unit conversion here.
          example:
          - 0.01
          - 0
          - 0
          - 0
          - 0.01
          - 0
          - 0
          - 0
          - 0.01
          items:
            type: number
        pc_precomputed:
          type: number
          description: |
            Optional pre-computed collision probability from ingest
            (Space-Track published Pc, if available).
            If null the planner uses Mahalanobis distance as risk surrogate.
          nullable: true
        covariance_source:
          $ref: "#/components/schemas/CovarianceSourceEnum"
      description: Relative geometry at Time of Closest Approach (TCA)
    OperatorPolicy:
      required:
      - dv_mag_limit_m_s
      - lambda_L
      - lambda_v
      type: object
      properties:
        lambda_v:
          type: number
          description: "Fuel-cost weight: U = delta_C - lambda_v * dv - lambda_L * dL"
          example: 0.01
        lambda_L:
          type: number
          description: Lifetime-penalty weight in the utility function
          example: 0.005
        dv_mag_limit_m_s:
          type: number
          description: Maximum allowable burn magnitude for this event (m/s)
          example: 1
        burn_window:
          $ref: "#/components/schemas/BurnWindow"
        hard_constraints:
          $ref: "#/components/schemas/HardConstraints"
      description: Operator policy inputs that tune the decision objective
    BurnWindow:
      type: object
      properties:
        earliest_utc:
          type: string
          description: Earliest permissible burn time (UTC)
          format: date-time
        latest_utc:
          type: string
          description: Latest permissible burn time (UTC)
          format: date-time
      description: Temporal constraints on burn execution
    HardConstraints:
      type: object
      properties:
        no_burn_windows:
          type: array
          description: "Time intervals where burns are forbidden (e.g., eclipse, comms)"
          items:
            $ref: "#/components/schemas/NoBurnWindow"
        attitude_restricted:
          type: boolean
          description: "If true, only along-track burns are permitted"
          default: false
        power_constrained:
          type: boolean
          description: "If true, apply reduced thrust profile"
          default: false
      description: Additional execution constraints
    NoBurnWindow:
      type: object
      properties:
        start_utc:
          type: string
          format: date-time
        end_utc:
          type: string
          format: date-time
    EvaluateResponse:
      required:
      - conjunction_id
      - metrics
      - recommendation
      type: object
      properties:
        conjunction_id:
          type: string
          example: conj-2026-0302-001
        recommendation:
          $ref: "#/components/schemas/ManeuverRecommendation"
        metrics:
          $ref: "#/components/schemas/DecisionMetrics"
        covariance_source:
          $ref: "#/components/schemas/CovarianceSourceEnum"
        evaluated_at:
          type: string
          description: Timestamp when the evaluation was computed
          format: date-time
    ManeuverRecommendation:
      required:
      - direction
      - dv_eci_km_s
      - dv_magnitude_m_s
      - t_burn_utc
      - utility
      type: object
      properties:
        direction:
          type: string
          description: Named burn direction (best of the three candidates)
          example: prograde
          enum:
          - prograde
          - radial
          - cross-track
        dv_eci_km_s:
          maxItems: 3
          minItems: 3
          type: array
          description: "Recommended delta-v vector in ECI [dvx, dvy, dvz] (km/s)"
          example:
          - 0
          - 0.001
          - 0
          items:
            type: number
        dv_magnitude_m_s:
          type: number
          description: Burn magnitude (m/s)
          example: 1
        t_burn_utc:
          type: string
          description: Scheduled burn time (echoed from request)
          format: date-time
        utility:
          type: number
          description: "Utility score: U = delta_C - lambda_v * dv - lambda_L * dL"
          example: 4.23
      description: The recommended burn -- machine-readable output for GNC / ATLAS
    DecisionMetrics:
      required:
      - delta_C
      - fuel_cost_m_s
      - lifetime_penalty
      - m2_post
      - m2_pre
      type: object
      properties:
        delta_C:
          type: number
          description: "Confidence gain: delta_C = m2_pre - m2_post (Mahalanobis)"
          example: 5.12
        m2_pre:
          type: number
          description: Pre-maneuver Mahalanobis squared distance
          example: 8.34
        m2_post:
          type: number
          description: Post-maneuver Mahalanobis squared distance
          example: 3.22
        fuel_cost_m_s:
          type: number
          description: Fuel expenditure (m/s)
          example: 1
        lifetime_penalty:
          type: number
          description: Dimensionless lifetime cost = dv / V_remaining
          example: 0.04
        risk_surrogate_post:
          type: number
          description: Post-maneuver risk surrogate (1/m2_post or Pc if available)
          example: 0.31
        all_candidates:
          type: array
          description: Full sweep results for all evaluated directions (for audit / ATLAS)
          items:
            $ref: "#/components/schemas/CandidateResult"
      description: Decision-support metrics (consumed by ATLAS for display)
    CandidateResult:
      type: object
      properties:
        direction:
          type: string
        dv_eci_km_s:
          type: array
          items:
            type: number
        delta_C:
          type: number
        utility:
          type: number
    CovarianceSourceEnum:
      type: string
      description: |
        Provenance of the covariance used in this evaluation.
        - real_cdm: covariance assembled from a live Space-Track CDM record
          via the ingest service GET /cdm endpoint.
        - surrogate_identity: identity matrix substitute, used when no CDM
          is available for the object pair. Results are pipeline-valid but
          not operationally accurate. ATLAS must display a visible warning
          to the operator when this value is present in the response.
      example: real_cdm
      enum:
      - real_cdm
      - surrogate_identity
    EvaluateBatchRequest:
      required:
      - conjunctions
      type: object
      properties:
        conjunctions:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/EvaluateRequest"
    EvaluateBatchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/EvaluateResponse"
        evaluated_at:
          type: string
          format: date-time
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 2.4.3
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
          example: r_rel_km must be a 3-element array
        detail:
          type: object
          description: Machine-readable validation detail
